<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../shared/module.css">
  <title>住在你里面</title>
</head>
<body>
  <div id="worship-module"></div>
  <script src="../shared/module.js"></script>
  <script>
    WorshipModule.mount({
      title: "住在你里面",
      sectionLabel: "回应诗歌",
      eyebrow: "回应诗歌 · 住在你里面",
      theme: "desert",
      accent: "#efc174",
      accentSoft: "rgba(219, 149, 77, 0.2)",
      particle: "#f0cc8f",
      slides: [
        {
          theme: "desert",
          visual: "eagle",
          title: "等候你 · 如鹰展翅",
          eyebrow: "第一段 · 渴慕寻求",
          lines: [
            "在干旱无水之地我渴慕你，",
            "在旷野无人之处我寻求你，",
            "得救在乎归回安息，",
            "得力在乎平静安稳，",
            "我等候你，如鹰展翅上腾。"
          ]
        },
        {
          theme: "vine",
          visual: "vine-life",
          title: "枝子与葡萄树紧紧相连",
          eyebrow: "副歌 · 住在你里面",
          lines: [
            "住在你里面，住在你里面，",
            "如同枝子与葡萄树紧紧相连。",
            "住在你里面，住在你里面，",
            "领受生命活水泉源永不枯竭。"
          ]
        }
      ]
    });
  </script>
</body>
</html>
