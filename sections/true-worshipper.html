<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../shared/module.css">
  <title>真实的敬拜者</title>
</head>
<body>
  <div id="worship-module"></div>
  <script src="../shared/module.js"></script>
  <script>
    WorshipModule.mount({
      title: "真实的敬拜者",
      sectionLabel: "正式诗歌 4",
      eyebrow: "真实的敬拜者",
      theme: "temple",
      accent: "#e7bd72",
      accentSoft: "rgba(231, 189, 114, 0.2)",
      particle: "#f0d39b",
      slides: [
        {
          theme: "temple",
          visual: "altar-search",
          title: "主所寻找的敬拜",
          eyebrow: "第一段 · 寻找",
          lines: [
            "为主来到这地方",
            "人们献上敬拜赞美",
            "主却找不到一个",
            "真实的敬拜者而悲伤"
          ]
        },
        {
          theme: "truth",
          visual: "heart-cross",
          title: "以心灵和诚实",
          eyebrow: "第二段 · 回应",
          lines: [
            "因主所寻找的人",
            "是一个真实敬拜者",
            "我愿成为那一个",
            "以心灵诚实敬拜的人"
          ]
        },
        {
          theme: "surrender",
          visual: "kneeling-worship",
          title: "唯有敬拜我的主",
          eyebrow: "第三段 · 俯伏",
          lines: [
            "因主恩典，我站在这地方",
            "因主同在，向祂俯伏敬拜",
            "世上的一切都不能满足",
            "唯有敬拜我的主"
          ]
        }
      ]
    });
  </script>
</body>
</html>
