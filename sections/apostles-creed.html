<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../shared/module.css">
  <title>使徒信经</title>
</head>
<body>
  <div id="worship-module"></div>
  <script src="../shared/module.js"></script>
  <script>
    WorshipModule.mount({
      title: "使徒信经",
      sectionLabel: "使徒信经",
      eyebrow: "同心恭诵 · 宣告信仰",
      theme: "scripture",
      accent: "#e5c680",
      accentSoft: "rgba(229, 198, 128, 0.18)",
      particle: "#ead59f",
      slides: [
        {
          mode: "scripture",
          center: true,
          title: "使徒信经 · 上",
          lines: [
            "我信上帝，全能的父，创造天地的主。",
            "我信我主耶稣基督，上帝的独生子；",
            "因圣灵成孕，由童贞女马利亚所生；",
            "在本丢彼拉多手下受难，被钉于十字架，受死，埋葬；",
            "降在阴间；第三天从死人中复活；"
          ]
        },
        {
          mode: "scripture",
          center: true,
          title: "使徒信经 · 下",
          lines: [
            "升天，坐在全能父上帝的右边；",
            "将来必从那里降临，审判活人、死人。",
            "我信圣灵；我信圣而公之教会；我信圣徒相通；",
            "我信罪得赦免，我信身体复活；我信永生。",
            "阿们！"
          ]
        }
      ]
    });
  </script>
</body>
</html>
