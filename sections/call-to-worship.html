<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../shared/module.css">
  <title>宣召 · 诗篇第十三篇</title>
</head>
<body>
  <div id="worship-module"></div>
  <script src="../shared/module.js"></script>
  <script>
    WorshipModule.mount({
      title: "诗篇第十三篇",
      sectionLabel: "宣召",
      eyebrow: "宣召 · 诗篇第十三篇",
      theme: "scripture",
      visual: "book",
      accent: "#e5c680",
      accentSoft: "rgba(229, 198, 128, 0.18)",
      particle: "#eedba7",
      slides: [
        {
          mode: "scripture",
          title: "要到几时呢？",
          lines: [
            "<span class='verse-no'>1</span> 耶和华啊，你忘记我要到几时呢？要到永远吗？你掩面不顾我要到几时呢？",
            "<span class='verse-no'>2</span> 我心里筹算，终日愁苦，要到几时呢？我的仇敌升高压制我，要到几时呢？"
          ]
        },
        {
          mode: "scripture",
          title: "求祢看顾我，应允我",
          lines: [
            "<span class='verse-no'>3</span> 耶和华我的神啊，求你看顾我，应允我！使我眼目光明，免得我沉睡至死；",
            "<span class='verse-no'>4</span> 免得我的仇敌说：我胜了他；免得我的敌人在我摇动的时候喜乐。"
          ]
        },
        {
          mode: "scripture",
          title: "我倚靠祢的慈爱",
          lines: [
            "<span class='verse-no'>5</span> 但我倚靠你的慈爱；我的心因你的救恩快乐。",
            "<span class='verse-no'>6</span> 我要向耶和华歌唱，因他用厚恩待我。"
          ]
        }
      ]
    });
  </script>
</body>
</html>
